let currentLang = 'no';
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.lang-btn[onclick="setLang(\''+lang+'\')"]').classList.add('active');
  const t = i18n[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.dataset.i18n; if (t[k] !== undefined) el.innerHTML = t[k]; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { const k = el.dataset.i18nPh; if (t[k] !== undefined) el.placeholder = t[k]; });
  const titles = { no:'Del din erfaring', sv:'Dela din erfarenhet', da:'Del din oplevelse', en:'Share your experience' };
  document.title = titles[lang] + ' — DealJourney'; const bwLink = document.getElementById('bwLink'); if(bwLink && t.bw_url) bwLink.href = t.bw_url;
}
function switchType(type) {
  document.getElementById('btnNew').classList.toggle('active', type==='new');
  document.getElementById('btnExisting').classList.toggle('active', type==='existing');
  document.getElementById('panelNew').classList.toggle('visible', type==='new');
  document.getElementById('panelExisting').classList.toggle('visible', type==='existing');
}
function handleFileSelect(input, prevId, nameId) {
  if (input.files && input.files[0]) { document.getElementById(nameId).textContent = input.files[0].name; document.getElementById(prevId).classList.add('visible'); }
}
document.querySelectorAll('.drop-zone').forEach(zone => {
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); const input = zone.querySelector('input[type="file"]'); if (e.dataTransfer.files.length) { const dt = new DataTransfer(); dt.items.add(e.dataTransfer.files[0]); input.files = dt.files; input.dispatchEvent(new Event('change')); } });
});
async function uploadFile(file, bucket) {
  const ext = file.name.split('.').pop();
  const filename = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
  const res = await fetch(SUPABASE_URL + '/storage/v1/object/' + bucket + '/' + filename, { method:'POST', headers:{'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type}, body:file });
  if (!res.ok) return null;
  return SUPABASE_URL + '/storage/v1/object/public/' + bucket + '/' + filename;
}
async function submitForm() {
  const t = i18n[currentLang];
  const navn = document.getElementById('navn').value.trim();
  const isNew = document.getElementById('panelNew').classList.contains('visible');
  const uttalelse = isNew ? document.getElementById('newQuestion').value.trim() : document.getElementById('existingQuestion').value.trim();
  document.getElementById('errorMsg').classList.remove('visible');
  if (!navn) { showError(t.err_name); document.getElementById('navn').focus(); return; }
  if (!uttalelse) { showError(t.err_review); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '...';
  try {
    let logo_url = null, bilde_url = null;
    const logoFile = document.getElementById('logoFile').files[0];
    const photoFile = document.getElementById('photoFile').files[0];
    if (logoFile) logo_url = await uploadFile(logoFile, 'uttalelser-logoer');
    if (photoFile) bilde_url = await uploadFile(photoFile, 'uttalelser-bilder');
    const payload = { navn, rolle: document.getElementById('rolle').value.trim()||null, er_ny_kunde:isNew, uttalelse, bedrift_beskrivelse:document.getElementById('bedriftBeskrivelse').value.trim()||null, nettside:document.getElementById('nettside').value.trim()||null, linkedin:document.getElementById('linkedin').value.trim()||null, logo_url, bilde_url, status:'ny' };
    const res = await fetch(SUPABASE_URL+'/rest/v1/uttalelser', { method:'POST', headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'}, body:JSON.stringify(payload) });
    if (!res.ok) { const err = await res.json(); throw new Error(err.message||'Error'); }
    document.getElementById('formContent').style.transition = 'opacity 0.3s';
    document.getElementById('formContent').style.opacity = '0';
    setTimeout(() => { document.getElementById('formContent').style.display='none'; document.getElementById('thankYou').classList.add('visible'); window.scrollTo({top:0,behavior:'smooth'}); }, 300);
  } catch(err) { showError(t.err_generic + err.message); btn.disabled=false; btn.textContent=t.btn_submit; }
}
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent=msg; el.classList.add('visible'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
setLang('no');
</script>
