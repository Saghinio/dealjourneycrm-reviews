<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Kundeuttalelser — DealJourney</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d14; --surface: #17131f; --surface2: #1e1829;
    --border: rgba(145,36,235,0.18); --purple-1: #9124EB; --purple-2: #C024E8; --purple-3: #C634F7;
    --mint: #A6FDCF; --teal: #3FB896; --text: #ffffff; --text-mid: #c4bdd8; --text-dim: #8b82a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); min-height: 100vh; }

  /* Login screen */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 48px 52px; width: 100%; max-width: 420px; text-align: center;
    box-shadow: 0 0 60px rgba(145,36,235,0.08);
  }
  .logo-mark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .site-logo { width: 200px; height: auto; }
  .site-logo-sm { width: 140px; height: auto; }
  .logo-symbol {
    width: 40px; height: 40px; background: linear-gradient(135deg, var(--purple-1), var(--purple-3));
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 22px; color: white;
  }
  .logo-wordmark { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); }
  .logo-wordmark span { background: linear-gradient(90deg, var(--purple-1), var(--purple-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-title { font-size: 22px; font-weight: 300; margin-bottom: 8px; }
  .login-sub { font-size: 13px; color: var(--text-mid); font-weight: 300; margin-bottom: 32px; }
  .login-field { margin-bottom: 16px; text-align: left; }
  .login-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-mid); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .login-field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 16px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--purple-1); }
  .login-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--purple-1), var(--purple-2));
    color: white; border: none; border-radius: 10px; font-family: 'Roboto', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-error { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
  .login-error.visible { display: block; }

  /* Admin app */
  .admin-app { display: none; }
  .admin-app.visible { display: block; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-count { background: rgba(145,36,235,0.2); color: var(--purple-3); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--text-mid); font-family: 'Roboto', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--purple-1); color: var(--text); }
  .refresh-btn { background: rgba(145,36,235,0.15); border: 1px solid rgba(145,36,235,0.3); color: var(--text); font-family: 'Roboto', sans-serif; font-size: 12px; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: rgba(145,36,235,0.25); }

  .filter-bar { padding: 20px 32px; display: flex; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .filter-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text-mid); font-family: 'Roboto', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { background: rgba(145,36,235,0.15); border-color: var(--purple-1); color: var(--text); }

  .content { padding: 24px 32px; }
  .loading { text-align: center; padding: 60px; color: var(--text-mid); font-size: 14px; font-weight: 300; }
  .empty { text-align: center; padding: 60px; color: var(--text-mid); }
  .empty-icon { font-size: 40px; margin-bottom: 16px; }
  .empty p { font-size: 14px; font-weight: 300; }

  .reviews-grid { display: grid; gap: 16px; }
  .review-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px;
    transition: border-color 0.2s;
  }
  .review-card:hover { border-color: rgba(145,36,235,0.35); }

  .review-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 16px; }
  .review-person { display: flex; align-items: center; gap: 14px; }
  .review-avatar {
    width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
    background: linear-gradient(135deg, var(--purple-1), var(--teal));
    display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; font-weight: 500;
  }
  .review-avatar img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
  .review-name { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
  .review-meta { font-size: 12px; color: var(--text-mid); font-weight: 300; }
  .review-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .badge-new { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; background: rgba(63,184,150,0.15); color: var(--teal); border: 1px solid rgba(63,184,150,0.3); }
  .badge-existing { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; background: rgba(145,36,235,0.15); color: var(--purple-3); border: 1px solid rgba(145,36,235,0.3); }

  .review-text { font-size: 15px; line-height: 1.8; color: var(--text); font-weight: 400; font-style: normal; margin-bottom: 20px; border-left: 3px solid var(--purple-1); padding-left: 16px; }

  .review-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .review-links { display: flex; gap: 12px; }
  .review-link { font-size: 12px; color: var(--text-mid); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 4px; }
  .review-link:hover { color: var(--purple-3); }
  .review-link svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 1.5; fill: none; }
  .review-date { font-size: 11px; color: var(--text-mid); font-weight: 300; }
  .review-logo { max-height: 28px; max-width: 100px; object-fit: contain; filter: brightness(0) invert(0.7); }
  .review-company { font-size: 12px; color: var(--text-mid); font-weight: 300; margin-top: 12px; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }

  .status-actions { display: flex; gap: 8px; }
  .status-btn { font-size: 11px; padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: none; color: var(--text-mid); font-family: 'Roboto', sans-serif; cursor: pointer; transition: all 0.2s; }
  .status-btn.publish { border-color: rgba(63,184,150,0.4); color: var(--teal); }
  .status-btn.publish:hover { background: rgba(63,184,150,0.1); }
  .status-btn.reject { border-color: rgba(255,100,100,0.3); color: #ff7070; }
  .status-btn.reject:hover { background: rgba(255,100,100,0.08); }
  .status-tag { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
  .status-tag.ny { background: rgba(255,200,50,0.12); color: #ffc832; border: 1px solid rgba(255,200,50,0.25); }
  .status-tag.publisert { background: rgba(63,184,150,0.12); color: var(--teal); border: 1px solid rgba(63,184,150,0.25); }
  .status-tag.avvist { background: rgba(255,100,100,0.08); color: #ff7070; border: 1px solid rgba(255,100,100,0.2); }
.dl-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(145,36,235,0.3); background: rgba(145,36,235,0.08); color: var(--purple-3); text-decoration: none; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.dl-btn:hover { background: rgba(145,36,235,0.18); }
.dl-btn svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none; }
.review-images { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; }
.img-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
.img-thumb-logo { height: 32px; max-width: 100px; object-fit: contain; border-radius: 6px; background: rgba(255,255,255,0.05); padding: 4px 8px; border: 1px solid var(--border); }

  @media (max-width: 600px) { .content { padding: 16px; } .review-card { padding: 20px; } .topbar { padding: 0 16px; } .filter-bar { padding: 16px; } }
</style>
</head>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('alle', this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('ny', this)">Nye</button>
    <button class="filter-btn" onclick="setFilter('publisert', this)">Publisert</button>
    <button class="filter-btn" onclick="setFilter('avvist', this)">Avvist</button>
  </div>

  <div class="content">
    <div class="loading" id="loadingEl">Laster uttalelser...</div>
    <div class="empty" id="emptyEl" style="display:none"><div class="empty-icon">📭</div><p>Ingen uttalelser ennå.</p></div>
    <div class="reviews-grid" id="reviewsGrid"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://nxzkyesnjvgcvwyokwdm.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_0LReF4E4CkYETFQGHyBoxg__Fv944jP';

  let accessToken = null;
  let currentFilter = 'alle';
  let allReviews = [];

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.classList.remove('visible');

    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = 'Feil e-post eller passord.';
      errEl.classList.add('visible');
      return;
    }

    accessToken = data.access_token;
    sessionStorage.setItem('dj_token', accessToken);
    showAdmin();
  }

  function doLogout() {
    sessionStorage.removeItem('dj_token');
    accessToken = null;
    document.getElementById('adminApp').classList.remove('visible');
    document.getElementById('loginScreen').style.display = 'flex';
  }

  function showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').classList.add('visible');
    loadReviews();
  }

  async function loadReviews() {
    document.getElementById('loadingEl').style.display = 'block';
    document.getElementById('emptyEl').style.display = 'none';
    document.getElementById('reviewsGrid').innerHTML = '';

    const res = await fetch(`${SUPABASE_URL}/rest/v1/uttalelser?order=opprettet.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}` }
    });

    if (res.status === 401) { doLogout(); return; }
    allReviews = await res.json();
    document.getElementById('loadingEl').style.display = 'none';
    renderReviews();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReviews();
  }

  function renderReviews() {
    const filtered = currentFilter === 'alle' ? allReviews : allReviews.filter(r => r.status === currentFilter);
    document.getElementById('countBadge').textContent = allReviews.length;
    const grid = document.getElementById('reviewsGrid');
    grid.innerHTML = '';

    if (filtered.length === 0) {
      document.getElementById('emptyEl').style.display = 'block';
      return;
    }
    document.getElementById('emptyEl').style.display = 'none';

    filtered.forEach(r => {
      const initials = r.navn ? r.navn.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() : '?';
      const dato = new Date(r.opprettet).toLocaleDateString('no-NO', { day: 'numeric', month: 'long', year: 'numeric' });
      const statusTag = `<span class="status-tag ${r.status}">${r.status}</span>`;
      const avatarHtml = '<div class="review-avatar">' + initials + '</div>';
let imagesHtml = '';
if (r.bilde_url || r.logo_url) {
  const dlIcon = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
  let imgParts = '';
  if (r.bilde_url) imgParts += '<img class="img-thumb" src="' + r.bilde_url + '" alt="Personbilde"> <a class="dl-btn" href="' + r.bilde_url + '" download target="_blank">' + dlIcon + 'Last ned bilde</a>';
  if (r.logo_url) imgParts += '<img class="img-thumb-logo" src="' + r.logo_url + '" alt="Logo"> <a class="dl-btn" href="' + r.logo_url + '" download target="_blank">' + dlIcon + 'Last ned logo</a>';
  imagesHtml = '<div class="review-images">' + imgParts + '</div>';
}
const logoHtml = '';
const companyHtmlconst companyHtml = r.bedrift_beskrivelse ? `<div class="review-company">${r.bedrift_beskrivelse}</div>` : '';
      const actionsHtml = r.status === 'ny' ? `
        <div class="status-actions">
          <button class="status-btn publish" onclick="updateStatus('${r.id}', 'publisert')">Publiser</button>
          <button class="status-btn reject" onclick="updateStatus('${r.id}', 'avvist')">Avvis</button>
        </div>` : statusTag;

      grid.innerHTML += `
        <div class="review-card" id="card-${r.id}">
          <div class="review-header">
            <div class="review-person">
              ${avatarHtml}
              <div>
                <div class="review-name">${r.navn}</div>
                <div class="review-meta">${r.rolle || ''}</div>
              </div>
            </div>
            <div class="review-badges">
              <span class="${r.er_ny_kunde ? 'badge-new' : 'badge-existing'}">${r.er_ny_kunde ? 'Ny kunde' : 'Eksisterende'}</span>
              ${actionsHtml}
            </div>
          </div>
          <div class="review-text">${r.uttalelse}</div>
          <div class="review-footer">
            <div style="display:flex;align-items:center;gap:16px"><div class="review-links">${linksHtml}</div></div>
<div class="review-date">${dato}</div>
</div>
${companyHtml}
${imagesHtml}
</div>`;
    });
  }

  async function updateStatus(id, status) {
    await fetch(`${SUPABASE_URL}/rest/v1/uttalelser?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status })
    });
    allReviews = allReviews.map(r => r.id === id ? { ...r, status } : r);
    renderReviews();
  }

  // Check existing session
  const saved = sessionStorage.getItem('dj_token');
  if (saved) { accessToken = saved; showAdmin(); }
</script>
